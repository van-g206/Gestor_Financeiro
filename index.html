<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GESTOR FINANCEIRO PRO - V10</title>

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon--16x16.png">
<link rel="manifest" href="site.webmanifest">

    <meta name="theme-color" content="#ff85a2">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Gestor V10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="formata.css"> 

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log("Service Worker Ativo!"))
          .catch(err => console.log("Erro no Service Worker:", err));
      }
    </script>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>CONFIGURAÇÕES ✨</span>
            <button class="close-menu" onclick="toggleMenu()">&times;</button>
        </div>

        <div class="sidebar-content">
            <div class="sidebar-section">
                <label>METAS DE GASTOS (%)</label>
                <div class="input-group">
                    <label>Necessidades (%)</label>
                    <input type="number" id="metaN" value="50">
                </div>
                <div class="input-group">
                    <label>Desejos (%)</label>
                    <input type="number" id="metaD" value="30">
                </div>
                <div class="input-group">
                    <label>Poupança (%)</label>
                    <input type="number" id="metaS" value="20">
                </div>
            </div>

            <div class="sidebar-section">
                <label>SIMULADOR DOMINGOS (100%)</label>
                <p style="font-size: 10px; color: var(--muted); margin-bottom: 8px;">Jornada das 07h às 13h (6 horas)</p>
                <input id="simDomingos" type="number" placeholder="Quantos domingos trabalhados?">
                <div id="resDomingos" style="margin-top: 10px; font-size: 0.85rem; line-height: 1.4;"></div>
            </div>

            <div class="sidebar-section">
                <button class="menu-action" onclick="baixarBackup()"><i class="fa-solid fa-download"></i> Salvar Backup</button>
                <input type="file" id="fileInput" style="display:none" onchange="restaurarBackup(this)">
                <button class="menu-action" onclick="document.getElementById('fileInput').click()"><i class="fa-solid fa-upload"></i> Restaurar Dados</button>
            </div>
        </div>
    </aside>

    <header class="no-print">
        <div class="header-content">
            <div class="header-left">
                <button class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
                <span class="brand">Gestor V10</span>
            </div>
            <div class="header-right">
                <input type="month" id="mesReferencia" class="date-input" onchange="mudarMes()">
            </div>
        </div>
    </header>

    <div class="print-only report-header">
        <h3 id="print-mes"></h3>
    </div>

    <main class="wrap">
        <div class="grid">
            
            <section class="left-col">
                <div class="card no-print">
                    <h3><i class="fa-solid fa-id-card"></i> Configurações Base</h3>
                    <div class="row">
                        <div class="input-group">
                            <label>Piso Salarial (220h)</label>
                            <input id="piso" type="number" value="2306.08">
                        </div>
                        <div class="input-group">
                            <label>Ticket (Mensal)</label>
                            <input id="ticket" type="number" value="410">
                        </div>
                    </div>
                    <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: 600; color: var(--primary-dark); cursor: pointer;">
                        <input id="incluirVr" type="checkbox"> Somar Ticket na Renda Disponível
                    </label>
                </div>

                <div class="card">
                    <h3><i class="fa-solid fa-receipt"></i> Entradas Reais</h3>
                    <div class="row">
                        <div class="input-group">
                            <label>Adiantamento (40%)</label>
                            <input id="manualDia20" type="number" placeholder="Valor dia 20">
                        </div>
                        <div class="input-group">
                            <label>Pagamento (60%)</label>
                            <input id="manualDia05" type="number" placeholder="Valor dia 05">
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3><i class="fa-solid fa-house-chimney"></i> Contas Fixas</h3>
                    <div class="input-group">
                        <label>Aluguel / Fixos Principais</label>
                        <input id="aluguel" type="number" placeholder="0,00">
                    </div>
                    <form class="no-print" onsubmit="event.preventDefault(); addVariavel();">
                        <div class="row">
                            <div class="input-group"><label>Descrição</label><input id="descVar" placeholder="Ex: Luz, Internet"></div>
                            <div class="input-group"><label>Valor</label><input id="valorVar" type="number" step="0.01"></div>
                        </div>
                        <div class="input-group"><label>Categoria</label><select id="catVar"></select></div>
                        <button type="submit" class="btn-add">Adicionar Conta</button>
                    </form>
                    <div class="table-container">
                        <table id="tabVar"></table>
                    </div>
                </div>

                <div class="card">
                    <h3><i class="fa-solid fa-cart-shopping"></i> Gastos Diários</h3>
                    <form class="no-print" onsubmit="event.preventDefault(); addGasto();">
                        <div class="row" style="grid-template-columns: 80px 1fr 1fr;">
                            <div class="input-group">
                                <label>Dia</label>
                                <input id="gDia" type="number" placeholder="01" min="1" max="31">
                            </div>
                            <div class="input-group">
                                <label>Descrição</label>
                                <input id="gDesc" placeholder="Ex: Mercado">
                            </div>
                            <div class="input-group">
                                <label>Valor</label>
                                <input id="gVal" type="number" step="0.01">
                            </div>
                        </div>
                        <div class="input-group"><label>Categoria</label><select id="gCat"></select></div>
                        <button type="submit" class="btn-add secondary">Registrar Gasto</button>
                    </form>
                    <div class="table-container">
                        <table id="tabHist"></table>
                    </div>
                </div>
            </section>

            <section class="right-col">
                <div class="card sticky-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3><i class="fa-solid fa-chart-line"></i> Resumo</h3>
                        <button class="btn-pdf no-print" onclick="gerarPDF()"><i class="fa-solid fa-file-pdf"></i></button>
                    </div>
                    
                    <div class="summary-grid">
                        <div class="sum-box"><small>Recebido</small><br><strong class="txt-green" id="tTotal">R$ 0,00</strong></div>
                        <div class="sum-box"><small>Despesas</small><br><strong class="txt-red" id="tGastos">R$ 0,00</strong></div>
                    </div>

                    <div class="main-balance">
                        <small>SALDO LIVRE ✨</small>
                        <h2 id="tSobra">R$ 0,00</h2>
                    </div>

                    <div class="chart-container no-print" style="height: 200px; margin-bottom: 20px;">
                        <canvas id="financeChart"></canvas>
                    </div>

                    <div class="progress-section">
                        <div class="prog-item">
                            <div class="prog-info"><span>Necessidades</span> <b id="txtN"></b></div>
                            <div class="prog-bar"><div id="barN" class="fill fill-n"></div></div>
                        </div>
                        <div class="prog-item">
                            <div class="prog-info"><span>Desejos</span> <b id="txtD"></b></div>
                            <div class="prog-bar"><div id="barD" class="fill fill-d"></div></div>
                        </div>
                        <div class="prog-item">
                            <div class="prog-info"><span>Reserva</span> <b id="txtS"></b></div>
                            <div class="prog-bar"><div id="barS" class="fill fill-s"></div></div>
                        </div>
                    </div>

                    <button class="btn-archive no-print" style="margin-top: 20px;" onclick="arquivarMes()">Fechar Mês</button>
                </div>

                <div class="card">
                    <h3><i class="fa-solid fa-folder-open"></i> Meses Arquivados</h3>
                    <div id="listaHistorico" class="history-list"></div>
                </div>
            </section>
        </div>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
